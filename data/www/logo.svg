<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.95)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.6)"/>
    </linearGradient>
  </defs>
  <!-- Hexagon background -->
  <polygon points="256,28 478,156 478,412 256,540 34,412 34,156" fill="url(#bg)" rx="20"/>
  <!-- Circuit traces on left -->
  <line x1="120" y1="180" x2="190" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <circle cx="120" cy="180" r="6" fill="rgba(255,255,255,0.3)"/>
  <line x1="120" y1="220" x2="170" y2="220" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <line x1="170" y1="220" x2="170" y2="260" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <circle cx="170" cy="260" r="5" fill="rgba(255,255,255,0.3)"/>
  <!-- Circuit traces on right -->
  <line x1="390" y1="320" x2="340" y2="320" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <circle cx="390" cy="320" r="6" fill="rgba(255,255,255,0.3)"/>
  <line x1="370" y1="350" x2="370" y2="380" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <circle cx="370" cy="350" r="5" fill="rgba(255,255,255,0.3)"/>
  <!-- Beer glass -->
  <path d="M210,380 L210,270 Q210,240 230,230 L282,230 Q302,240 302,270 L302,370 Q302,390 256,390 Q210,390 210,380Z" fill="url(#glass)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Beer liquid -->
  <path d="M214,375 L214,300 Q214,280 232,272 L280,272 Q298,280 298,300 L298,370 Q298,380 256,380 Q214,380 214,375Z" fill="#f59e0b" opacity="0.9"/>
  <!-- Beer foam -->
  <ellipse cx="256" cy="275" rx="40" ry="12" fill="white" opacity="0.9"/>
  <ellipse cx="248" cy="272" rx="15" ry="5" fill="white" opacity="0.7"/>
  <ellipse cx="268" cy="270" rx="12" ry="4" fill="white" opacity="0.7"/>
  <!-- Hop cone -->
  <ellipse cx="256" cy="240" rx="14" ry="22" fill="#4ade80"/>
  <ellipse cx="250" cy="238" rx="6" ry="12" fill="#22c55e" opacity="0.6"/>
  <!-- Hop leaves -->
  <ellipse cx="240" cy="250" rx="10" ry="16" fill="#22c55e" transform="rotate(-30,240,250)"/>
  <ellipse cx="272" cy="250" rx="10" ry="16" fill="#22c55e" transform="rotate(30,272,250)"/>
  <!-- Handle -->
  <path d="M302,300 Q340,300 340,340 Q340,370 302,370" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="6" stroke-linecap="round"/>
  <!-- Bubbles -->
  <circle cx="240" cy="340" r="4" fill="white" opacity="0.3"/>
  <circle cx="260" cy="355" r="3" fill="white" opacity="0.25"/>
  <circle cx="250" cy="320" r="3" fill="white" opacity="0.2"/>
  <circle cx="270" cy="330" r="2" fill="white" opacity="0.3"/>
</svg>
